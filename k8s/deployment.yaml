apiVersion: apps/v1
kind: Deployment
metadata:
  name: hpcopt-api
  namespace: hpcopt
  labels:
    app.kubernetes.io/name: hpcopt-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: hpc-workload-optimizer
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: hpcopt-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hpcopt-api
        app.kubernetes.io/component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: hpcopt-api
          image: ghcr.io/hpc-workload-optimizer/hpcopt:latest
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: hpcopt-config
          env:
            - name: HPCOPT_API_KEYS_FILE
              value: /run/secrets/hpcopt/api_keys.txt
          volumeMounts:
            - name: api-keys
              mountPath: /run/secrets/hpcopt
              readOnly: true
            - name: model-storage
              mountPath: /app/outputs/models
              readOnly: true
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: api-keys
          secret:
            secretName: hpcopt-api-keys
        - name: model-storage
          persistentVolumeClaim:
            claimName: hpcopt-models
      terminationGracePeriodSeconds: 30
