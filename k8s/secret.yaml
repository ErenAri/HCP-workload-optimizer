# IMPORTANT: Replace placeholder values before deploying.
# In production, use sealed-secrets, external-secrets, or vault-csi-driver.
#
# Example:
#   echo -n "your-api-key" | base64
#   # paste the result into the data field below
apiVersion: v1
kind: Secret
metadata:
  name: hpcopt-api-keys
  namespace: hpcopt
  labels:
    app.kubernetes.io/name: hpcopt-api
    app.kubernetes.io/part-of: hpc-workload-optimizer
type: Opaque
data:
  # base64-encoded content of api_keys.txt (one key per line)
  api_keys.txt: REPLACE_WITH_BASE64_ENCODED_KEYS
