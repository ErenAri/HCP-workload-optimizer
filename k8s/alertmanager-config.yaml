# Alertmanager Configuration Template
#
# Deploy in the observability namespace alongside Prometheus.
# Replace placeholder webhook URLs and tokens with your own values.
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: hpcopt
  labels:
    app.kubernetes.io/part-of: hpc-workload-optimizer
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      group_by: ['alertname', 'severity']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: 'default'
      routes:
        - match:
            severity: critical
          receiver: 'pagerduty-critical'
          repeat_interval: 1h
        - match:
            severity: warning
          receiver: 'slack-warnings'
          repeat_interval: 4h

    receivers:
      - name: 'default'
        slack_configs:
          - api_url: 'https://hooks.slack.com/services/REPLACE/WITH/WEBHOOK'
            channel: '#hpcopt-alerts'
            title: '{{ .GroupLabels.alertname }}'
            text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'

      - name: 'pagerduty-critical'
        pagerduty_configs:
          - service_key: 'REPLACE_WITH_PAGERDUTY_INTEGRATION_KEY'
            severity: '{{ .GroupLabels.severity }}'
            description: '{{ .GroupLabels.alertname }}: {{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'

      - name: 'slack-warnings'
        slack_configs:
          - api_url: 'https://hooks.slack.com/services/REPLACE/WITH/WEBHOOK'
            channel: '#hpcopt-alerts'
            title: ':warning: {{ .GroupLabels.alertname }}'
            text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'

    inhibit_rules:
      - source_match:
          severity: 'critical'
        target_match:
          severity: 'warning'
        equal: ['alertname']
