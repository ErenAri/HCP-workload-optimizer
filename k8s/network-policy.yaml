apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: hpcopt-api
  namespace: hpcopt
  labels:
    app.kubernetes.io/name: hpcopt-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: hpc-workload-optimizer
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: hpcopt-api
  policyTypes:
    - Ingress
  ingress:
    # Allow traffic from ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
    # Allow traffic from monitoring namespace (Prometheus scraping)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 8080
