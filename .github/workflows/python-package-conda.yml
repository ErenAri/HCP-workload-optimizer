name: Python Package using Conda

on: [push]

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Add conda to system path
        run: echo "$CONDA/bin" >> $GITHUB_PATH

      - name: Create CI environment
        run: |
          conda env remove -n hpcopt-ci -y || true
          conda env create -n hpcopt-ci -f environment.yml
          conda run -n hpcopt-ci python --version

      - name: Lint with flake8
        run: |
          conda run -n hpcopt-ci python -m pip install flake8
          # Stop on syntax errors / undefined names.
          conda run -n hpcopt-ci flake8 python --count --select=E9,F63,F7,F82 --show-source --statistics
          # Keep style report informational.
          conda run -n hpcopt-ci flake8 python --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Test with pytest
        run: conda run -n hpcopt-ci pytest tests/ -v
