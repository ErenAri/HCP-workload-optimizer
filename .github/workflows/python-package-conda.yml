name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Lint / Type-check / Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Add conda to system path
        run: echo "$CONDA/bin" >> $GITHUB_PATH

      - name: Create CI environment
        run: |
          conda env remove -n hpcopt-ci -y || true
          conda env create -n hpcopt-ci -f environment.yml
          conda run -n hpcopt-ci python --version

      - name: Lint with ruff
        run: conda run -n hpcopt-ci ruff check python/

      - name: Type-check with mypy
        run: conda run -n hpcopt-ci mypy python/hpcopt/ --ignore-missing-imports

      - name: Security scan with bandit
        run: conda run -n hpcopt-ci bandit -r python/hpcopt/ -ll -ii

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: quality
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,production]"

      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --cov=hpcopt \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=86 \
            -W error

      - name: Enforce package-level coverage floors
        run: |
          python scripts/check_coverage_thresholds.py \
            --coverage-xml coverage.xml \
            --global-fail-under 86 \
            --package-threshold api=88 \
            --package-threshold models=89 \
            --package-threshold simulate=86

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  checks:
    name: Docs / OpenAPI / Readiness / Version
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Add conda to system path
        run: echo "$CONDA/bin" >> $GITHUB_PATH

      - name: Create CI environment
        run: |
          conda env remove -n hpcopt-ci -y || true
          conda env create -n hpcopt-ci -f environment.yml

      - name: Docs consistency check
        run: conda run -n hpcopt-ci python scripts/check_docs_consistency.py

      - name: OpenAPI compatibility check
        run: conda run -n hpcopt-ci python scripts/check_openapi_compat.py --baseline schemas/openapi_baseline.json

      - name: Production readiness validation
        run: conda run -n hpcopt-ci python scripts/production_readiness_gate.py --mode validate

      - name: Version consistency check
        run: conda run -n hpcopt-ci python scripts/verify_version_consistency.py

  rust:
    name: Rust check / clippy / test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cargo check
        run: cargo check --workspace

      - name: Cargo clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Cargo test
        run: cargo test --workspace
