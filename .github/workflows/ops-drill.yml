name: Ops Drill

on:
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

jobs:
  drift-monitor:
    name: Drift monitor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run drift monitor
        run: python scripts/run_drift_monitor.py

  dr-drill:
    name: DR backup/restore drill
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run DR drill
        run: python scripts/dr_backup_restore_drill.py

